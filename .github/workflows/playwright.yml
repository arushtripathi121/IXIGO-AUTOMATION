name: Playwright Cucumber Automation

on:
  push:
    branches:
      - main
      - master
      - feat
  pull_request:
    branches:
      - main
      - master
      - feat
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        suite: [bus, flights, hotels, train, visa]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Setup Auth Session
        run: npm run setup

      - name: Create Test Results Folder
        run: mkdir -p test-results

      - name: Run ${{ matrix.suite }} Tests
        run: npm run ${{ matrix.suite }}

      - name: Upload JSON Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.suite }}-json-report
          path: test-results/

      - name: Upload Screenshots & Videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.suite }}-evidence
          path: |
            test-results/
            screenshots/
            videos/

  merge-report:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Download All JSON Reports
        uses: actions/download-artifact@v4
        with:
          path: merged-artifacts

      - name: Merge JSON Files
        run: |
          mkdir -p test-results
          find merged-artifacts -name "*.json" -exec cp {} test-results/ \;

      - name: Generate HTML Report
        run: npm run html-report

      - name: Generate PDF Report
        run: npm run pdf-report

      - name: Upload Final Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-test-reports
          path: |
            cucumber-report/
            pdfReport/
            test-results/